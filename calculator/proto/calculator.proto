syntax="proto3";

package calculator;

option go_package = "grpc-calculator/proto";

service Calculator{
  rpc Add(CalcRequest) returns (CalcResponse);
  rpc Multiply(CalcRequest) returns (CalcResponse);
}

message CalcRequest{
  int32 a = 1;
  int32 b = 2;
}

message CalcResponse{
  int32 result = 1;
}
